context:
  version: "0.10.3"

package:
  name: lelwel
  version: ${{ version }}

source:
  url: https://github.com/0x2a-42/lelwel/archive/v${{ version }}.tar.gz
  sha256: 9aae7672ad9767f007ba3a7b1d4f4dcefc3325e88e585d4b24a05ce118dc0435

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - llw --help

about:
  license: Apache-2.0 AND MIT
  license_file:
    - LICENSE-APACHE
    - LICENSE-MIT
    - THIRDPARTY.yml
  summary: Resilient LL(1) parser generator for Rust
  homepage: https://github.com/0x2a-42/lelwel
  repository: https://github.com/0x2a-42/lelwel

extra:
  recipe-maintainers:
    - danielnachun
